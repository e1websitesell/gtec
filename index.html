<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>GTEC Boys Hostel — মিল ম্যানেজমেন্ট</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#1e3a5f" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="page-center">
  <div class="container">
    <div class="brand">
      <div class="brand-mark">G</div>
      <div>
        <div class="brand-name">GTEC Boys Hostel</div>
        <div class="brand-sub">মিল ম্যানেজমেন্ট সিস্টেম</div>
      </div>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab-btn active" id="tabLoginBtn" type="button">লগইন</button>
        <button class="tab-btn" id="tabSignupBtn" type="button">নতুন অ্যাকাউন্ট</button>
      </div>

      <div class="alert alert-error" id="errorBox"></div>
      <div class="alert alert-success" id="successBox"></div>

      <!-- ===== লগইন ফর্ম ===== -->
      <form id="loginForm">
        <div class="field">
          <label for="loginUsername">ইউজারনেম</label>
          <input type="text" id="loginUsername" placeholder="যেমন: rakib_1002" required autocomplete="username" />
        </div>
        <div class="field">
          <label for="loginPassword">পাসওয়ার্ড</label>
          <input type="password" id="loginPassword" placeholder="পাসওয়ার্ড দিন" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn">
          <span class="spinner" id="loginSpinner"></span>
          <span id="loginBtnText">লগইন করুন</span>
        </button>
      </form>

      <!-- ===== সাইনআপ ফর্ম ===== -->
      <form id="signupForm" style="display:none;">
        <div class="field">
          <label for="signupName">পুরো নাম</label>
          <input type="text" id="signupName" placeholder="যেমন: রাকিব হাসান" required />
        </div>
        <div class="field">
          <label for="signupRoom">রুম নাম্বার</label>
          <input type="text" id="signupRoom" placeholder="যেমন: 1002" required />
        </div>
        <div class="field">
          <label for="signupUsername">ইউজারনেম বানান</label>
          <input type="text" id="signupUsername" placeholder="শুধু ইংরেজি অক্ষর ও সংখ্যা" required />
          <div class="field-hint">এটা দিয়েই পরে লগইন করবেন, তাই মনে রাখবেন।</div>
        </div>
        <div class="field">
          <label for="signupPassword">পাসওয়ার্ড</label>
          <input type="password" id="signupPassword" placeholder="কমপক্ষে ৬ ক্যারেক্টার" required minlength="6" />
        </div>
        <button type="submit" class="btn btn-primary" id="signupBtn">
          <span class="spinner" id="signupSpinner"></span>
          <span id="signupBtnText">অ্যাকাউন্ট তৈরি করুন</span>
        </button>
      </form>
    </div>

    <p style="text-align:center; margin-top:18px; font-size:12.5px;">
      অ্যাকাউন্ট তৈরির পর অ্যাডমিন অ্যাপ্রুভ করলেই ব্যবহার করতে পারবেন।
    </p>
  </div>
</div>

<script type="module" src="js/auth.js"></script>
</body>
</html>
