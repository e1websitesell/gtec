<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>হোম — GTEC Boys Hostel</title>
<meta name="theme-color" content="#1e3a5f" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../css/style.css" />
<style>
  .day-card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    padding: 14px;
    margin-bottom: 10px;
  }
  .day-card-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .day-card-date {
    font-weight: 700;
    font-size: 14.5px;
  }
  .day-card-tag {
    font-size: 11.5px;
    color: var(--color-text-muted);
  }
  .option-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  .option-btn {
    padding: 9px 4px;
    text-align: center;
    border: 1.5px solid var(--color-border);
    border-radius: var(--radius-sm);
    background: #fff;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    color: var(--color-text-muted);
    cursor: pointer;
  }
  .option-btn.selected {
    background: var(--color-primary);
    border-color: var(--color-primary);
    color: #fff;
  }
  .locked-note {
    font-size: 12px;
    color: var(--color-text-muted);
    text-align: center;
    padding: 8px 0;
  }
  .carried-tag {
    display: inline-block;
    font-size: 11px;
    color: var(--color-warning);
    background: var(--color-warning-bg);
    padding: 1px 8px;
    border-radius: 999px;
    margin-left: 6px;
  }
  .bottom-nav {
    position: sticky;
    bottom: 0;
    background: var(--color-surface);
    border-top: 1px solid var(--color-border);
    display: flex;
    justify-content: space-around;
    padding: 8px 0;
    margin-top: 24px;
  }
  .bottom-nav a {
    text-decoration: none;
    color: var(--color-text-muted);
    font-size: 12px;
    text-align: center;
  }
</style>
</head>
<body>

<div id="loadingScreen" class="state-screen">
  <div class="spinner" style="display:inline-block; border-color:rgba(30,58,95,0.2); border-top-color:var(--color-primary); width:28px; height:28px;"></div>
</div>

<div id="appShell" style="display:none; padding:20px 16px 0; max-width:480px; margin:0 auto;">
  <div class="brand">
    <div class="brand-mark">G</div>
    <div>
      <div class="brand-name" id="welcomeText">স্বাগতম</div>
      <div class="brand-sub">GTEC Boys Hostel</div>
    </div>
  </div>

  <!-- কারেন্ট স্ট্যাটাস -->
  <div class="card" style="text-align:center; margin-bottom:20px;">
    <p style="margin-bottom:12px;" id="todayLabel">আজকের মিল</p>
    <div class="status-badge status-off" id="statusBadge">
      <span class="dot"></span>
      <span id="statusText">লোড হচ্ছে...</span>
    </div>
  </div>

  <div id="noCycleMsg" class="alert alert-error" style="display:block;">
    এখনো কোনো মিল সাইকেল চালু হয়নি। অ্যাডমিনের সাথে যোগাযোগ করো।
  </div>

  <div id="calendarSection" style="display:none;">
    <h3 style="margin-bottom:12px; font-size:15px;">আগামী দিনগুলোর মিল সেট করো</h3>
    <div id="dayList"></div>
    <p style="font-size:12px; text-align:center; margin-top:6px;">
      প্রতিটা দিনের মিল সেই দিনের আগের রাত ১১:৫৯:৫৯ পর্যন্ত পরিবর্তন করা যাবে। এরপর অটোমেটিক লক হয়ে যাবে।
    </p>
  </div>

  <div class="bottom-nav">
    <a href="home.html">🏠<br/>হোম</a>
    <a href="#" id="logoutBtn">🚪<br/>লগআউট</a>
  </div>
</div>

<script type="module" src="../js/student.js"></script>
</body>
</html>
