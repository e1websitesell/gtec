<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>অ্যাপ্রুভালের অপেক্ষায় — GTEC Boys Hostel</title>
<meta name="theme-color" content="#1e3a5f" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="state-screen">
  <div class="state-icon">⏳</div>
  <h2>অ্যাপ্রুভালের অপেক্ষায়</h2>
  <p style="max-width:320px;">
    আপনার অ্যাকাউন্ট তৈরি হয়েছে। হোস্টেল অ্যাডমিন যাচাই করে অ্যাপ্রুভ করলেই আপনি অ্যাপ ব্যবহার করতে পারবেন।
  </p>
  <button class="btn btn-outline" id="refreshBtn" style="width:auto; padding:10px 20px; margin-top:8px;">
    আবার চেক করুন
  </button>
  <button class="btn" id="logoutBtn" style="width:auto; padding:10px 20px; margin-top:10px; background:transparent; color:var(--color-text-muted);">
    লগআউট
  </button>
</div>

<script type="module">
  import { auth, db } from "./js/firebase-config.js";
  import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = "index.html";
      return;
    }
    const snap = await getDoc(doc(db, "users", user.uid));
    if (snap.exists() && snap.data().status === "approved") {
      const role = snap.data().role;
      window.location.href = (role === "mainadmin" || role === "subadmin") ? "admin/dashboard.html" : "student/home.html";
    }
  });

  document.getElementById("refreshBtn").addEventListener("click", () => window.location.reload());
  document.getElementById("logoutBtn").addEventListener("click", async () => {
    await signOut(auth);
    window.location.href = "index.html";
  });
</script>
</body>
</html>
