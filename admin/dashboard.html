<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>অ্যাডমিন ড্যাশবোর্ড — GTEC Boys Hostel</title>
<meta name="theme-color" content="#1e3a5f" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<div id="loadingScreen" class="state-screen">
  <div class="spinner" style="display:inline-block; border-top-color:var(--color-primary); border-color:rgba(30,58,95,0.2); border-top-color:var(--color-primary); width:28px; height:28px;"></div>
</div>

<div id="appShell" style="display:none;">
  <div class="admin-topbar">
    <div class="brand" style="margin-bottom:0;">
      <div class="brand-mark">G</div>
      <div>
        <div class="brand-name">GTEC Boys Hostel</div>
        <div class="brand-sub" id="adminRoleLabel">অ্যাডমিন প্যানেল</div>
      </div>
    </div>
    <div style="display:flex; gap:8px; align-items:center;">
      <a href="sheet.html" class="btn btn-outline btn-sm" style="text-decoration:none;">মিল শিট</a>
      <button class="btn btn-outline btn-sm" id="logoutBtn">লগআউট</button>
    </div>
  </div>

  <div class="admin-main">

    <!-- ===== সাইকেল সেটিংস ===== -->
    <div class="section-title">
      <h3>মিল সাইকেল</h3>
    </div>
    <div class="card" id="cycleCard" style="margin-bottom:32px;">
      <p id="cycleInfo">লোড হচ্ছে...</p>
      <button class="btn btn-outline btn-sm" id="newCycleBtn">নতুন সাইকেল শুরু করো</button>
      <div id="newCycleForm" style="display:none; margin-top:14px;">
        <div class="field">
          <label for="cycleStartDate">শুরুর তারিখ</label>
          <input type="date" id="cycleStartDate" />
        </div>
        <button class="btn btn-primary btn-sm" id="confirmNewCycleBtn">কনফার্ম করো</button>
      </div>
    </div>

    <!-- ===== পেন্ডিং অ্যাপ্রুভাল ===== -->
    <div class="section-title">
      <h3>পেন্ডিং অ্যাপ্রুভাল <span id="pendingCount" class="pill pill-pending">০</span></h3>
      <button class="btn btn-primary btn-sm" id="approveAllBtn">সব অ্যাপ্রুভ করুন</button>
    </div>
    <div id="pendingList" style="margin-bottom:32px;"></div>

    <!-- ===== অ্যাপ্রুভড ইউজার লিস্ট (রুম-ওয়াইজ) ===== -->
    <div class="section-title">
      <h3>ইউজার লিস্ট (রুম অনুযায়ী)</h3>
    </div>
    <div id="approvedList"></div>

  </div>
</div>

<script type="module" src="../js/admin.js"></script>
</body>
</html>
