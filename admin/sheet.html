<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>মিল শিট — GTEC Boys Hostel</title>
<meta name="theme-color" content="#1e3a5f" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../css/style.css" />
<style>
  .sheet-wrap {
    overflow-x: auto;
    background: var(--color-surface);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-card);
  }
  table.sheet-table {
    border-collapse: collapse;
    font-size: 13px;
    min-width: 100%;
  }
  table.sheet-table th,
  table.sheet-table td {
    border: 1px solid var(--color-border);
    padding: 6px 8px;
    text-align: center;
    white-space: nowrap;
  }
  table.sheet-table th {
    background: var(--color-primary-light);
    font-size: 11.5px;
    color: var(--color-text-muted);
    position: sticky;
    top: 0;
  }
  table.sheet-table td.name-col,
  table.sheet-table th.name-col {
    position: sticky;
    left: 0;
    background: var(--color-surface);
    text-align: left;
    z-index: 2;
    min-width: 140px;
  }
  table.sheet-table th.name-col {
    background: var(--color-primary-light);
    z-index: 3;
  }
  td.summary-col {
    font-weight: 700;
    background: #fbfbfc;
  }
  td.off-cell {
    color: var(--color-text-muted);
  }
  td.on-cell {
    color: var(--color-success);
    font-weight: 600;
  }
  .room-header-row td {
    background: var(--color-bg);
    font-weight: 700;
    text-align: left !important;
    color: var(--color-primary);
  }
</style>
</head>
<body>

<div id="loadingScreen" class="state-screen">
  <div class="spinner" style="display:inline-block; border-color:rgba(30,58,95,0.2); border-top-color:var(--color-primary); width:28px; height:28px;"></div>
</div>

<div id="appShell" style="display:none;">
  <div class="admin-topbar">
    <div class="brand" style="margin-bottom:0;">
      <div class="brand-mark">G</div>
      <div>
        <div class="brand-name">মিল শিট</div>
        <div class="brand-sub" id="cycleLabel">লোড হচ্ছে...</div>
      </div>
    </div>
    <a href="dashboard.html" class="btn btn-outline btn-sm" style="text-decoration:none;">ড্যাশবোর্ডে ফিরো</a>
  </div>

  <div class="admin-main">
    <div id="noCycleMsg" class="alert alert-error" style="display:none;">
      কোনো অ্যাক্টিভ সাইকেল নেই। ড্যাশবোর্ড থেকে একটা সাইকেল শুরু করো।
    </div>
    <div id="sheetContainer" class="sheet-wrap"></div>
    <p style="font-size:12px; margin-top:10px;">
      লা = লাঞ্চ, ডি = ডিনার, উভ = লাঞ্চ+ডিনার, - = অফ। Extra Lunch = (Total Lunch − Total Dinner) × ০.৫ (নেগেটিভ হলে ০)।
    </p>
  </div>
</div>

<script type="module" src="../js/sheet.js"></script>
</body>
</html>
